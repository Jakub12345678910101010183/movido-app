<!doctype html>
<html lang="en-GB">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary SEO -->
    <title>Movido — HGV Fleet Management &amp; Dispatch Software | UK</title>
    <meta name="description" content="Professional HGV fleet management platform built in Northampton. Real-time GPS tracking, AI route optimisation, digital POD, and WTD compliance. Built for UK logistics dispatchers." />
    <meta name="keywords" content="HGV fleet management, logistics software, dispatch software, UK fleet tracking, route optimisation, digital POD, WTD compliance, Northampton logistics" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Movido Logistics" />

    <!-- Google Search Console verification -->
    <meta name="google-site-verification" content="uVj2QI53TnmL0uyL0qnx_48H-SDRZLxpDWX9dDpx_Qo" />

    <!-- Canonical — tells Google this is the ONE true URL, ignores movidologistics.com -->
    <link rel="canonical" href="https://movidologistics.uk/" />

    <!-- Open Graph (social sharing) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://movidologistics.uk/" />
    <meta property="og:title" content="Movido — HGV Fleet Management &amp; Dispatch Software" />
    <meta property="og:description" content="Professional HGV fleet management platform. Real-time tracking, AI route optimisation, digital POD, and WTD compliance for UK logistics." />
    <meta property="og:image" content="https://movidologistics.uk/images/dashboard-preview.jpg" />
    <meta property="og:locale" content="en_GB" />
    <meta property="og:site_name" content="Movido Logistics" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Movido — HGV Fleet Management Software" />
    <meta name="twitter:description" content="AI-powered dispatch platform for UK HGV logistics. Built in Northampton." />
    <meta name="twitter:image" content="https://movidologistics.uk/images/dashboard-preview.jpg" />

    <!-- Schema.org structured data — helps Google understand the business -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Movido",
      "url": "https://movidologistics.uk",
      "description": "HGV fleet management and dispatch software built for UK logistics. Features real-time GPS tracking, AI route optimisation, digital POD and WTD compliance.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web, iOS, Android",
      "offers": { "@type": "Offer", "priceCurrency": "GBP" },
      "author": {
        "@type": "Organization",
        "name": "Movido Logistics",
        "url": "https://movidologistics.uk",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Northampton",
          "addressRegion": "Northamptonshire",
          "addressCountry": "GB"
        }
      }
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>

</html>
